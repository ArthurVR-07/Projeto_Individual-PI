<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Cadastro</title>

  <script src="./js/sessao.js"></script>

  <link rel="stylesheet" href="./css/login_cadastro.css" />
  <link rel="icon" href="./assets/icon/logo.png" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Bebas+Neue&family=Share+Tech+Mono&display=swap" />
</head>

<body onload="listar()">
  <!--header inicio-->
  <div class="header">
        <div class="logo">
            <a href="index.html"><img src="./assets/icon/logo.png" alt="logo"></a>
        </div>

        <div class="navegacao">
            <a href="index.html#equipes">Equipes</a>
            <a href="index.html#armas_imperiais">Armas Imperiais</a>
            <a href="index.html#arcos_historia">Arcos</a>
            <a href="">DashBoard</a>
        </div>

        <div class="voltar_inicio">
          <a href="index.html"><span style="font-size: 16px;"><</span> Voltar para o Início</a>
        </div>
        
    </div>
  <!--header fim-->

  <div class="container">
    <div class="decoracao">
      <img src="assets/imgs/img_akame.png">
    </div>
    <div class="formulario">
      <div class="titulo">Novo Recrutamento</div>

      <div class="campo">
        <label for="nome_input">Nome</label>
        <input type="text" id="nome_input" placeholder="Digite seu nome">
      </div>
      
      <div class="campo">
        <label for="" id="user_name_input">Nome de Usuário</label>
        <input type="text" id="user_name_input" placeholder="seu_username">
      </div>

      <div class="campo">
        <label for="email_input">Email</label>
        <input type="text" id="email_input" placeholder="email@exemplo.com">
      </div>

      <div class="campo">
        <label for="senha_input">Senha</label>
        <input type="password" id="senha_input" placeholder="******">
      </div>

      <div class="campo">
        <label for="confirmacao_senha_input">Confirmação de Senha</label>
        <input type="password" id="confirmacao_senha_input" placeholder="******">
      </div>

      <button onclick="cadastrar()">Criar Conta</button>

      <div class="campo_adicional">
        <span>Já possui conta? <a href="login.html" style="text-decoration: none; color: #BF1429;">ENTRAR</a></span>
      </div>

    </div>
  </div>
</body>

</html>

<script>

  // Array para armazenar empresas cadastradas para validação de código de ativação 
  let listaEmpresasCadastradas = [];

  function cadastrar() {
    // aguardar();

    //Recupere o valor da nova input pelo nome do id
    // Agora vá para o método fetch logo abaixo
    var nomeVar = nome_input.value;
    var emailVar = email_input.value;
    var senhaVar = senha_input.value;
    var confirmacaoSenhaVar = confirmacao_senha_input.value;
    var codigoVar = codigo_input.value;
    var idEmpresaVincular

    // Verificando se há algum campo em branco
    if (
      nomeVar == "" ||
      emailVar == "" ||
      senhaVar == "" ||
      confirmacaoSenhaVar == "" ||
      codigoVar == ""
    ) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML =
        "(Mensagem de erro para todos os campos em branco)";

      finalizarAguardar();
      return false;
    } else {
      setInterval(sumirMensagem, 5000);
    }

    // Verificando se o código de ativação é de alguma empresa cadastrada
    for (let i = 0; i < listaEmpresasCadastradas.length; i++) {
      if (listaEmpresasCadastradas[i].codigo_ativacao == codigoVar) {
        idEmpresaVincular = listaEmpresasCadastradas[i].id
        console.log("Código de ativação válido.");
        break;
      } else {
        cardErro.style.display = "block";
        mensagem_erro.innerHTML = "(Mensagem de erro para código inválido)";
        finalizarAguardar();
      }
    }

    // Enviando o valor da nova input
    fetch("/usuarios/cadastrar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        // crie um atributo que recebe o valor recuperado aqui
        // Agora vá para o arquivo routes/usuario.js
        nomeServer: nomeVar,
        emailServer: emailVar,
        senhaServer: senhaVar,
        idEmpresaVincularServer: idEmpresaVincular
      }),
    })
      .then(function (resposta) {
        console.log("resposta: ", resposta);

        if (resposta.ok) {
          cardErro.style.display = "block";

          mensagem_erro.innerHTML =
            "Cadastro realizado com sucesso! Redirecionando para tela de Login...";

          setTimeout(() => {
            window.location = "login.html";
          }, "2000");

          limparFormulario();
          finalizarAguardar();
        } else {
          throw "Houve um erro ao tentar realizar o cadastro!";
        }
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
        finalizarAguardar();
      });

    return false;
  }

  // Listando empresas cadastradas 
  function listar() {
    fetch("/empresas/listar", {
      method: "GET",
    })
      .then(function (resposta) {
        resposta.json().then((empresas) => {
          empresas.forEach((empresa) => {
            listaEmpresasCadastradas.push(empresa);

            console.log("listaEmpresasCadastradas")
            console.log(listaEmpresasCadastradas[0].codigo_ativacao)
          });
        });
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
      });
  }

  function sumirMensagem() {
    cardErro.style.display = "none";
  }
</script>
