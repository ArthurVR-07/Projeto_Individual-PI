<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login</title>

  <script src="./js/sessao.js"></script>

  <link rel="stylesheet" href="./css/login_cadastro.css" />
  <link rel="icon" href="./assets/icon/logo.png" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Bebas+Neue&family=Share+Tech+Mono&display=swap" />
</head>

<body>

    <!--Header-->

    <div class="header">
        <div class="logo">
            <a href="index.html"><img src="./assets/icon/logo.png" alt="logo"></a>
        </div>

        <div class="navegacao">
            <a href="index.html#equipes">Equipes</a>
            <a href="index.html#armas_imperiais">Armas Imperiais</a>
            <a href="index.html#arcos_historia">Arcos</a>
            <a href="">DashBoard</a>
        </div>

        <div class="voltar_inicio">
          <a href="index.html"><span style="font-size: 16px;"><</span> Voltar para o Início</a>
        </div>
        
    </div>

    <div class="container">
    <div class="decoracao">
      <img src="assets/imgs/esdeath.png">
    </div>
    <div class="formulario">
      <div class="titulo">Bem-Vindo(a) de volta!</div>

      <div class="campo">
        <label for="email_input">Email</label>
        <input type="text" id="email_input" placeholder="email@exemplo.com">
      </div>

      <div class="campo">
        <label for="senha_input">Senha</label>
        <input type="password" id="senha_input" placeholder="******">
      </div>

      <button onclick="entrar()">ENTRAR</button>

      <div class="campo_adicional">
        <span>Novo por aqui? <a href="cadastro.html" style="text-decoration: none; color: #BF1429;">CADASTRE-SE</a></span>
      </div>

    </div>
  </div>
</body>

</html>

<script>


    function entrar() {
        // aguardar();

        var emailVar = email_input.value;
        var senhaVar = senha_input.value;

        if (emailVar == "" || senhaVar == "") {
            // cardErro.style.display = "block"
            // mensagem_erro.innerHTML = "(Mensagem de erro para todos os campos em branco)";
            console.log("Mensagem de erro para todos os campos em branco")
            // finalizarAguardar();
            return false;
        }
        else {
            setInterval(sumirMensagem, 5000)
        }

        console.log("FORM LOGIN: ", emailVar);
        console.log("FORM SENHA: ", senhaVar);

        fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: emailVar,
                senhaServer: senhaVar
            })
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!")

            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then(json => {
                    console.log(json);
                    console.log(JSON.stringify(json));
                    sessionStorage.EMAIL_USUARIO = json.email;
                    sessionStorage.NOME_USUARIO = json.nome;
                    sessionStorage.ID_USUARIO = json.id;
                    // sessionStorage.AQUARIOS = JSON.stringify(json.aquarios)

                    setTimeout(function () {
                        window.location = "./dashboard/cards.html";
                    }, 1000); // apenas para exibir o loading

                });

            } else {

                console.log("Houve um erro ao tentar realizar o login!");

                resposta.text().then(texto => {
                    console.error(texto);
                    finalizarAguardar(texto);
                });
            }

        }).catch(function (erro) {
            console.log(erro);
        })

        return false;
    }

    function sumirMensagem() {
        cardErro.style.display = "none"
    }

</script>
